<section class="headline-strip" aria-label="Headline indicators">
  <article class="headline-tile">
    <span class="headline-label">GDP Growth</span>
    <strong class="headline-value" id="gdp-value">--</strong>
    <span class="headline-delta up" id="gdp-status">Loading</span>
    <small class="headline-source">QoQ / YoY placeholder</small>
  </article>

  <article class="headline-tile">
    <span class="headline-label">NODX</span>
    <strong class="headline-value" id="nodx-value">--</strong>
    <span class="headline-delta up" id="nodx-status">Loading</span>
    <small class="headline-source">EnterpriseSG placeholder</small>
  </article>

  <article class="headline-tile">
    <span class="headline-label">Core Inflation</span>
    <strong class="headline-value" id="inflation-value">--</strong>
    <span class="headline-delta down" id="inflation-status">Loading</span>
    <small class="headline-source">MAS / SingStat placeholder</small>
  </article>

  <article class="headline-tile">
    <span class="headline-label">Unemployment</span>
    <strong class="headline-value" id="unemployment-value">--</strong>
    <span class="headline-delta flat" id="unemployment-status">Loading</span>
    <small class="headline-source">Labour market placeholder</small>
  </article>

  <article class="headline-tile">
    <span class="headline-label">Manufacturing PMI</span>
    <strong class="headline-value" id="pmi-value">--</strong>
    <span class="headline-delta flat" id="pmi-status">Loading</span>
    <small class="headline-source">PMI placeholder</small>
  </article>

  <article class="headline-tile">
    <span class="headline-label">Financial Conditions</span>
    <strong class="headline-value" id="financial-value">--</strong>
    <span class="headline-delta watch" id="financial-status">Loading</span>
    <small class="headline-source">Rates / SGD proxy</small>
  </article>
</section>
